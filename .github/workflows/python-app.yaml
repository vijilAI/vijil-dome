name: Python Tests

permissions:
  contents: read
  id-token: write  # OIDC token for AWS S3 model access

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ 
      github.repository == 'vijilAI/vijil-dome' && (
        github.event_name == 'push' ||
        (github.event_name == 'pull_request' &&
         github.event.pull_request.head.repo.full_name == github.repository)
      ) && 'LargerRunner' || 'ubuntu-latest' }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: "3.12"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: latest
          virtualenvs-create: true
          virtualenvs-in-project: true

      # - name: Cache Poetry dependencies
      #   uses: actions/cache@v3
      #   with:
      #     path: |
      #       ~/.cache/pypoetry
      #       .venv
      #     key: ${{ runner.os }}-poetry-${{ hashFiles('**/poetry.lock') }}
      #     restore-keys: |
      #       ${{ runner.os }}-poetry-

      - name: Install dependencies from poetry project
        run: |
          poetry config virtualenvs.create false
          # Increase pip timeout to handle large packages
          export PIP_DEFAULT_TIMEOUT=300
          poetry install --no-interaction --no-root --all-extras
          # Install CPU-only PyTorch to avoid large CUDA dependencies in CI
          poetry run pip install --force-reinstall torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install project
        run: poetry install --no-interaction

      - name: Install pytest
        run: poetry add pytest
      
      - name: Lint
        run: |
          export PYTHONPATH=$PWD
          poetry add ruff mypy types-requests
          make lint

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::266735823956:role/github-actions-dome-ci
          aws-region: us-west-2

      - name: Sync Vijil models from S3
        run: |
          sudo mkdir -p /models/vijil
          sudo chown $USER /models/vijil
          # Sync only the small detector models (~570MB each), not LLMs
          aws s3 sync s3://vijil-inference/models/vijil/ /models/vijil/ \
            --exclude "*/gpt-oss-*" \
            --exclude "*/qwen*" \
            --exclude "*/glm*" \
            --exclude "*/gemma*"
          echo "Models synced:"
          ls -la /models/vijil/

      - name: Run tests
        env:
          VIJIL_MODEL_DIR: /models
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TOGETHERAI_API_KEY: ${{ secrets.TOGETHER_API_KEY }}
          PERSPECTIVE_API_KEY: ${{ secrets.PERSPECTIVE_API_KEY }}
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
        run: |
          export PYTHONPATH=$PWD
          make test
