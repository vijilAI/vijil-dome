# Vault Production Deployment
#
# Uses the official Vault Helm chart with:
# - Persistent storage (PVC)
# - JWT auth pre-configured for SPIRE OIDC
# - Auto-unseal via AWS KMS (optional)
#
# Prerequisites:
#   - Add Helm repo: helm repo add hashicorp https://helm.releases.hashicorp.com
#   - EBS CSI driver for PVC (or use existing managed Vault)
#
# Usage:
#   helm install vault hashicorp/vault \
#     -f deploy/vault-production.yaml \
#     --namespace vijil-proxy \
#     --create-namespace
#
# After install, run vault-setup.sh to configure JWT auth + secrets.

server:
  # Single-server mode (sufficient for most deployments)
  # For HA: set ha.enabled=true with Raft or Consul backend
  standalone:
    enabled: true

  dataStorage:
    enabled: true
    size: 5Gi
    storageClass: gp3  # Adjust per cloud provider

  # Auto-unseal via AWS KMS (recommended for production)
  # Uncomment and configure:
  # extraEnvironmentVars:
  #   VAULT_SEAL_TYPE: awskms
  #   AWS_REGION: us-west-2
  #   VAULT_AWSKMS_SEAL_KEY_ID: alias/vijil-vault-unseal

  # Resource limits
  resources:
    requests:
      memory: 256Mi
      cpu: 250m
    limits:
      memory: 512Mi
      cpu: 500m

  # Readiness probe
  readinessProbe:
    enabled: true
    path: "/v1/sys/health?standbyok=true&sealedcode=204&uninitcode=204"

  # Audit logging
  auditStorage:
    enabled: true
    size: 2Gi
    storageClass: gp3

ui:
  enabled: false  # No UI in production — CLI and API only

injector:
  enabled: false  # We use the LLM Proxy, not the Vault injector
