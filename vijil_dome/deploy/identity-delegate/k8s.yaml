# Identity Delegate Service — Kubernetes manifests
# Runs on the SPIRE-enabled EKS cluster.
# Mounts both the SPIRE workload API socket (for its own attestation)
# and the admin socket (for delegated identity calls).

apiVersion: v1
kind: ServiceAccount
metadata:
  name: identity-delegate
  namespace: spire-server
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-delegate
  namespace: spire-server
  labels:
    app: identity-delegate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-delegate
  template:
    metadata:
      labels:
        app: identity-delegate
    spec:
      serviceAccountName: identity-delegate
      containers:
        - name: delegate
          image: vijil-identity-delegate:latest
          ports:
            - containerPort: 8080
          env:
            - name: SPIRE_TRUST_DOMAIN
              value: "vijil.ai"
            - name: SPIRE_ADMIN_SOCKET
              value: "/run/spire/sockets/admin.sock"
            - name: AWS_ACCOUNT_ID
              value: "266735823956"
            # Default role mapping: any managed agent
            - name: ROLE_MAP_0
              value: "*|spiffe://vijil.ai/ns/managed/agent/{name}"
          volumeMounts:
            # Workload API socket (for this service's own SVID)
            - name: spiffe-workload-api
              mountPath: /spiffe-workload-api
              readOnly: true
            # Admin socket (for Delegated Identity API calls)
            - name: spire-admin
              mountPath: /run/spire/sockets
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: spiffe-workload-api
          csi:
            driver: "csi.spiffe.io"
            readOnly: true
        - name: spire-admin
          hostPath:
            path: /run/spire/sockets
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: identity-delegate
  namespace: spire-server
  labels:
    app: identity-delegate
spec:
  selector:
    app: identity-delegate
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
