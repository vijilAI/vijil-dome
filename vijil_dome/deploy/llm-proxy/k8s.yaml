# LLM Proxy — Kubernetes manifests for SPIRE-enabled EKS cluster
# Requires: SPIRE running, Vault deployed, proxy registered in SPIRE

apiVersion: v1
kind: Namespace
metadata:
  name: vijil-proxy
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: llm-proxy
  namespace: vijil-proxy
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: llm-proxy-config
  namespace: vijil-proxy
data:
  config.json: |
    {
      "listen_addr": ":8443",
      "spiffe_socket": "unix:///spiffe-workload-api/spire-agent.sock",
      "vault_addr": "http://vault.vijil-proxy.svc:8200",
      "vault_auth_mount": "jwt",
      "vault_audience": "vault.vijil.ai",
      "vault_role": "llm-proxy",
      "routes": [
        {
          "agent_id_pattern": "spiffe://vijil.ai/ns/*/agent/*",
          "provider": "anthropic",
          "upstream": "https://api.anthropic.com/v1/messages",
          "vault_path": "secret/data/llm/anthropic",
          "auth_header": "x-api-key",
          "auth_prefix": ""
        },
        {
          "agent_id_pattern": "spiffe://vijil.ai/ns/*/agent/*",
          "provider": "openai",
          "upstream": "https://api.openai.com/v1/chat/completions",
          "vault_path": "secret/data/llm/openai",
          "auth_header": "Authorization",
          "auth_prefix": "Bearer "
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-proxy
  namespace: vijil-proxy
  labels:
    app: llm-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llm-proxy
  template:
    metadata:
      labels:
        app: llm-proxy
    spec:
      serviceAccountName: llm-proxy
      containers:
        - name: proxy
          image: vijil-llm-proxy:latest
          ports:
            - containerPort: 8443
          volumeMounts:
            - name: spiffe-workload-api
              mountPath: /spiffe-workload-api
              readOnly: true
            - name: config
              mountPath: /etc/llm-proxy
              readOnly: true
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8443
              scheme: HTTPS
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 128Mi
      volumes:
        - name: spiffe-workload-api
          csi:
            driver: "csi.spiffe.io"
            readOnly: true
        - name: config
          configMap:
            name: llm-proxy-config
---
apiVersion: v1
kind: Service
metadata:
  name: llm-proxy
  namespace: vijil-proxy
  labels:
    app: llm-proxy
spec:
  selector:
    app: llm-proxy
  ports:
    - port: 8443
      targetPort: 8443
---
# Vault dev mode — for PoC only
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vault
  namespace: vijil-proxy
  labels:
    app: vault
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vault
  template:
    metadata:
      labels:
        app: vault
    spec:
      containers:
        - name: vault
          image: hashicorp/vault:1.17
          ports:
            - containerPort: 8200
          env:
            - name: VAULT_DEV_ROOT_TOKEN_ID
              value: "dev-token"
            - name: VAULT_DEV_LISTEN_ADDRESS
              value: "0.0.0.0:8200"
---
apiVersion: v1
kind: Service
metadata:
  name: vault
  namespace: vijil-proxy
  labels:
    app: vault
spec:
  selector:
    app: vault
  ports:
    - port: 8200
      targetPort: 8200
